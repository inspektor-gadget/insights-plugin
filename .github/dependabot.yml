version: 2
updates:
  - package-ecosystem: 'npm' # See documentation for possible values
    directory: '/' # Location of package manifests
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: "npm:"
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: "gha:"
  - package-ecosystem: "gomod"
    directories:
      - "**/*"
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: "go:"
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      k8s:
        patterns:
          - "k8s.io/*"
